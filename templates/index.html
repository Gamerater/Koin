<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koin — Small habits. Big savings.</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="logo">🪙 Koin</div>
        <p class="tagline">Small habits. Big savings.</p>
    </nav>

    <!-- MAIN LAYOUT -->
    <div class="container">

        <!-- ADD EXPENSE FORM -->
        <div class="card">
            <h2>Add Expense</h2>
            <div class="form-group">
                <label>Title</label>
                <input type="text" id="title" placeholder="e.g. Chai, Bus ticket...">
            </div>
            <div class="form-group">
                <label>Amount (₹)</label>
                <input type="number" id="amount" placeholder="e.g. 20">
            </div>
            <div class="form-group">
                <label>Category</label>
                <select id="category">
                    <option value="">Loading categories...</option>
                </select>
            </div>
            <div class="form-group">
                <label>Note (optional)</label>
                <input type="text" id="note" placeholder="Any extra detail...">
            </div>
            <button onclick="addExpense()" class="btn-primary">+ Add Expense</button>
            <p id="message"></p>
        </div>

        <!-- EXPENSE LIST -->
        <div class="card">
            <h2>Recent Expenses</h2>
            <div id="expense-list">Loading...</div>
        </div>

    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
